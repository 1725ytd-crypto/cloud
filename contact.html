    <div class="bbg">
        <h1 class="mg">聯絡我們</h1>
        <p class="mq" style="text-align: center;">有任何問題或建議的話，歡迎填寫下方的表單來聯絡我們～</p>
    </div>

    <div class="uk" style="padding: 50px 20px;">
        <div class="contact-box">
            <form id="contactForm">
                <div class="form-group">
                    <label for="name">姓名：</label>
                    <input type="text" id="name" name="name" placeholder="請輸入您的名稱" required>
                </div>
                
                <div class="form-group">
                    <label for="email">電子郵件：</label>
                    <input type="email" id="email" name="email" placeholder="example@mail.com" required>
                </div>

                <div class="form-group">
                    <label for="message">訊息內容：</label>
                    <textarea id="message" name="message" rows="5" placeholder="請輸入您想說的話..." required></textarea>
                </div>

                <button type="submit" class="buy-btn" style="width: 100%; font-size: 1.2rem;">送出訊息</button>
            </form>
            <div id="formResult" class="ms" style="margin-top: 20px; color: green; font-weight: bold;"></div>
        </div>
    </div>
    <form id="contactForm">
